version: "3.9"

services:
  db:
    image: mariadb:11
    container_name: solacecore-db
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Prague}
      MARIADB_DATABASE: ${DB_NAME:-solacecore}
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "1"
    volumes:
      - db-data:/var/lib/mysql
      - ./server/schema-moderators.sql:/docker-entrypoint-initdb.d/02-moderators.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: solacecore-api
    environment:
      TZ: ${TZ:-Europe/Prague}
      PORT: "${PORT:-3001}"
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: "${DB_PORT:-3306}"
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-solacecore}
      ENABLE_CORS: "${ENABLE_CORS:-1}"
      FRONTEND_DIST: /usr/share/nginx/html
      # JWT secret for moderator authentication
      # IMPORTANT: Change this in production!
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string-in-production-use-at-least-64-characters}
    depends_on:
      db:
        condition: service_started
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
    container_name: solacecore-web
    depends_on:
      api:
        condition: service_started
    environment:
      TZ: ${TZ:-Europe/Prague}
      HOST: ${HOST:-0.0.0.0}
    ports:
      - "${WEB_PORT:-8082}:80"
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: solacecore-phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      - PMA_HOST=${PMA_HOST:-db}
      - PMA_PORT=${PMA_PORT:-3306}
    ports:
      - "8081:80"

volumes:
  db-data: